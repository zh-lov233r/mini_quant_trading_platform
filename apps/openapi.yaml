openapi: 3.1.0
info:
  title: Quant Trading System API
  version: "1.1.0"
  description: >
    OpenAPI specification for the current quant-trading-system project.
    It is organized around the real backend domain model:
    Strategy -> StrategyRun -> Signal / Transaction / PortfolioSnapshot,
    plus market-data and broker-trading integrations.

    Notes:
    - Operations marked with x-implementation-status: implemented are already reflected by the current FastAPI codebase.
    - Operations marked with x-implementation-status: planned are aligned with existing service-layer and database structure,
      and are intended to guide the next API/router implementation pass.
servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Health
    description: Service health and root endpoints.
  - name: Strategies
    description: Strategy catalog, CRUD-style reads, and runtime configuration views.
  - name: Backtests
    description: Backtest creation and backtest-run inspection.
  - name: Runs
    description: Generic strategy-run queries across backtest / paper / live modes.
  - name: Market
    description: Historical bar data, instrument lookup, and market reference data.
  - name: Trading
    description: Broker-facing order placement, position inspection, and rebalance workflows.

paths:
  /:
    get:
      tags: [Health]
      summary: Root endpoint
      operationId: getRoot
      x-implementation-status: implemented
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"

  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealthz
      x-implementation-status: implemented
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/strategies/catalog:
    get:
      tags: [Strategies]
      summary: List strategy templates supported by the registry
      operationId: listStrategyCatalog
      x-implementation-status: implemented
      responses:
        "200":
          description: Strategy catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyCatalogItem"

  /api/strategies:
    get:
      tags: [Strategies]
      summary: List stored strategies
      operationId: listStrategies
      x-implementation-status: implemented
      parameters:
        - $ref: "#/components/parameters/StrategyStatusFilter"
        - $ref: "#/components/parameters/StrategyTypeFilter"
        - $ref: "#/components/parameters/StrategyNameFilter"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Strategy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyOut"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    post:
      tags: [Strategies]
      summary: Create a strategy definition
      operationId: createStrategy
      x-implementation-status: implemented
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyCreate"
      responses:
        "201":
          description: Strategy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyOut"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/strategies/{strategy_id}:
    get:
      tags: [Strategies]
      summary: Get a single strategy
      operationId: getStrategy
      x-implementation-status: implemented
      parameters:
        - $ref: "#/components/parameters/StrategyIdPath"
      responses:
        "200":
          description: Strategy detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyOut"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/strategies/{strategy_id}/runtime:
    get:
      tags: [Strategies]
      summary: Get normalized runtime payload for a strategy
      operationId: getStrategyRuntime
      x-implementation-status: implemented
      parameters:
        - $ref: "#/components/parameters/StrategyIdPath"
      responses:
        "200":
          description: Runtime-ready strategy payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyRuntimeOut"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/strategies/{strategy_id}/runs:
    get:
      tags: [Strategies]
      summary: List runs for one strategy
      description: >
        Intended to query strategy_runs filtered by strategy_id, with optional mode / status filters.
        This endpoint maps naturally to the Strategy -> StrategyRun relationship in the current ORM model.
      operationId: listStrategyRuns
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/StrategyIdPath"
        - $ref: "#/components/parameters/RunModeFilter"
        - $ref: "#/components/parameters/RunStatusFilter"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Strategy runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyRunSummary"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backtests:
    post:
      tags: [Backtests]
      summary: Run a backtest for an existing strategy
      description: >
        Aligned with the current synchronous run_backtest service. The backend persists a StrategyRun,
        signals, transactions, and portfolio snapshots, then returns a compact backtest summary.
      operationId: createBacktest
      x-implementation-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestCreate"
      responses:
        "200":
          description: Backtest completed and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/backtests/{run_id}:
    get:
      tags: [Backtests]
      summary: Get one backtest run
      operationId: getBacktestRun
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Backtest run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyRunDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backtests/{run_id}/signals:
    get:
      tags: [Backtests]
      summary: List signals generated by a backtest run
      operationId: listBacktestSignals
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Signals for the requested backtest run
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignalRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backtests/{run_id}/transactions:
    get:
      tags: [Backtests]
      summary: List simulated fills generated by a backtest run
      operationId: listBacktestTransactions
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Transactions for the requested backtest run
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backtests/{run_id}/snapshots:
    get:
      tags: [Backtests]
      summary: List portfolio snapshots for a backtest run
      operationId: listBacktestSnapshots
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Portfolio snapshots for the requested backtest run
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioSnapshotRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/runs:
    get:
      tags: [Runs]
      summary: List strategy runs across all modes
      operationId: listRuns
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunModeFilter"
        - $ref: "#/components/parameters/RunStatusFilter"
        - $ref: "#/components/parameters/StrategyIdFilter"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Strategy runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyRunSummary"

  /api/runs/{run_id}:
    get:
      tags: [Runs]
      summary: Get one strategy run
      operationId: getRun
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Strategy run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyRunDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/runs/{run_id}/signals:
    get:
      tags: [Runs]
      summary: List signals for a run
      operationId: listRunSignals
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Run signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignalRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/runs/{run_id}/transactions:
    get:
      tags: [Runs]
      summary: List transactions for a run
      operationId: listRunTransactions
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Run transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/runs/{run_id}/snapshots:
    get:
      tags: [Runs]
      summary: List portfolio snapshots for a run
      operationId: listRunSnapshots
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Run portfolio snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioSnapshotRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/market/bars:
    get:
      tags: [Market]
      summary: Get historical daily bars for one or more symbols
      description: >
        Designed around the current get_historical_data service, which returns daily EOD bars
        using either unadjusted or forward-adjusted prices.
      operationId: getHistoricalBars
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/SymbolsQuery"
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
        - $ref: "#/components/parameters/AdjustedQuery"
      responses:
        "200":
          description: Historical bars grouped by symbol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalBarsResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/instruments/search:
    get:
      tags: [Market]
      summary: Search instruments from the security master
      operationId: searchInstruments
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/InstrumentQuery"
        - $ref: "#/components/parameters/InstrumentActiveOnly"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Matching instruments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstrumentSummary"

  /api/trading/orders:
    post:
      tags: [Trading]
      summary: Place a broker order
      description: >
        Intended to wrap the current Alpaca paper-trading integration.
      operationId: createOrder
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: Order accepted by the broker adapter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    get:
      tags: [Trading]
      summary: List broker orders
      operationId: listOrders
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"

  /api/trading/orders/{order_id}:
    delete:
      tags: [Trading]
      summary: Cancel an order
      operationId: cancelOrder
      x-implementation-status: planned
      parameters:
        - $ref: "#/components/parameters/OrderIdPath"
      responses:
        "204":
          description: Order cancelled
        "404":
          $ref: "#/components/responses/NotFound"

  /api/trading/positions:
    get:
      tags: [Trading]
      summary: List current broker positions
      operationId: listPositions
      x-implementation-status: planned
      responses:
        "200":
          description: Open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /api/trading/rebalance:
    post:
      tags: [Trading]
      summary: Generate or execute rebalance orders from strategy signals
      operationId: rebalancePortfolio
      x-implementation-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RebalanceRequest"
      responses:
        "200":
          description: Rebalance result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebalanceResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

components:
  parameters:
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
        maxLength: 64
      description: Optional idempotency key used for create-order or create-strategy calls.

    StrategyIdPath:
      in: path
      name: strategy_id
      required: true
      schema:
        type: string
        format: uuid

    RunIdPath:
      in: path
      name: run_id
      required: true
      schema:
        type: string
        format: uuid

    OrderIdPath:
      in: path
      name: order_id
      required: true
      schema:
        type: string

    StrategyStatusFilter:
      in: query
      name: status
      required: false
      schema:
        $ref: "#/components/schemas/StrategyStatus"

    StrategyTypeFilter:
      in: query
      name: strategy_type
      required: false
      schema:
        $ref: "#/components/schemas/StrategyType"

    StrategyNameFilter:
      in: query
      name: name
      required: false
      schema:
        type: string
      description: Case-insensitive fuzzy match on strategy name.

    StrategyIdFilter:
      in: query
      name: strategy_id
      required: false
      schema:
        type: string
        format: uuid

    RunModeFilter:
      in: query
      name: mode
      required: false
      schema:
        $ref: "#/components/schemas/RunMode"

    RunStatusFilter:
      in: query
      name: status
      required: false
      schema:
        $ref: "#/components/schemas/RunStatus"

    SymbolsQuery:
      in: query
      name: symbols
      required: true
      description: Comma-separated ticker list, for example AAPL,MSFT,NVDA.
      schema:
        type: string
        example: AAPL,MSFT

    StartDate:
      in: query
      name: start_date
      required: true
      schema:
        type: string
        format: date

    EndDate:
      in: query
      name: end_date
      required: true
      schema:
        type: string
        format: date

    AdjustedQuery:
      in: query
      name: adjusted
      required: false
      schema:
        type: boolean
        default: false
      description: When true, return forward-adjusted prices when available.

    InstrumentQuery:
      in: query
      name: q
      required: true
      schema:
        type: string
      description: Search by canonical ticker, alias symbol, or instrument name.

    InstrumentActiveOnly:
      in: query
      name: active_only
      required: false
      schema:
        type: boolean
        default: true

    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100

    Offset:
      in: query
      name: offset
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict or duplicate request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Validation or normalization error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    RootResponse:
      type: object
      required: [app, message]
      properties:
        app:
          type: string
          example: Quant Backend
        message:
          type: string
          example: OK

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ValidationError"
      example:
        detail: strategy not found

    ValidationError:
      type: object
      required: [loc, msg, type]
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string

    FreeFormObject:
      type: object
      additionalProperties: true

    StrategyType:
      type: string
      enum: [trend, mean_reversion, custom]

    StrategyStatus:
      type: string
      enum: [draft, active, archived]

    RunMode:
      type: string
      enum: [backtest, paper, live]

    RunStatus:
      type: string
      enum: [queued, running, completed, failed, cancelled]

    SignalAction:
      type: string
      enum: [BUY, SELL, HOLD]

    TransactionSide:
      type: string
      enum: [BUY, SELL]

    BrokerOrderSide:
      type: string
      enum: [buy, sell]

    BrokerOrderType:
      type: string
      enum: [market, limit]

    IndicatorSpec:
      type: object
      required: [kind, window]
      properties:
        kind:
          type: string
          enum: [ema, sma]
        window:
          type: integer
          minimum: 1

    TrendStrategyParams:
      type: object
      required: [signal, universe, risk, execution, metadata]
      properties:
        signal:
          type: object
          required:
            [fast_indicator, slow_indicator, volume_multiplier, atr_multiplier, price_field, trigger]
          properties:
            fast_indicator:
              $ref: "#/components/schemas/IndicatorSpec"
            slow_indicator:
              $ref: "#/components/schemas/IndicatorSpec"
            volume_multiplier:
              type: number
              exclusiveMinimum: 0
            atr_multiplier:
              type: number
              exclusiveMinimum: 0
            price_field:
              type: string
              example: close
            trigger:
              type: string
              example: cross_over
        universe:
          $ref: "#/components/schemas/UniverseConfig"
        risk:
          type: object
          required: [max_positions, position_size_pct, stop_loss_atr]
          properties:
            max_positions:
              type: integer
              minimum: 1
            position_size_pct:
              type: number
              exclusiveMinimum: 0
              maximum: 1
            stop_loss_atr:
              type: number
              exclusiveMinimum: 0
        execution:
          $ref: "#/components/schemas/ExecutionConfig"
        metadata:
          $ref: "#/components/schemas/MetadataConfig"

    MeanReversionStrategyParams:
      type: object
      required: [signal, universe, risk, execution, metadata]
      properties:
        signal:
          type: object
          required: [lookback_window, zscore_entry, zscore_exit, price_field]
          properties:
            lookback_window:
              type: integer
              minimum: 1
            zscore_entry:
              type: number
              exclusiveMinimum: 0
            zscore_exit:
              type: number
              exclusiveMinimum: 0
            price_field:
              type: string
              example: close
        universe:
          $ref: "#/components/schemas/UniverseConfig"
        risk:
          type: object
          required: [max_positions, position_size_pct]
          properties:
            max_positions:
              type: integer
              minimum: 1
            position_size_pct:
              type: number
              exclusiveMinimum: 0
              maximum: 1
        execution:
          $ref: "#/components/schemas/ExecutionConfig"
        metadata:
          $ref: "#/components/schemas/MetadataConfig"

    UniverseConfig:
      type: object
      required: [symbols, selection_mode]
      properties:
        symbols:
          type: array
          items:
            type: string
          example: [AAPL, MSFT, NVDA]
        selection_mode:
          type: string
          example: manual

    ExecutionConfig:
      type: object
      required: [timeframe, rebalance, run_at]
      properties:
        timeframe:
          type: string
          example: 1d
        rebalance:
          type: string
          example: daily
        run_at:
          type: string
          example: close
        backtest:
          type: object
          properties:
            commission_bps:
              type: number
            commission_min:
              type: number
            slippage_bps:
              type: number

    MetadataConfig:
      type: object
      required: [description, schema_version]
      properties:
        description:
          type: string
        schema_version:
          type: integer
          minimum: 1

    StrategyCatalogItem:
      type: object
      required: [strategy_type, label, description, engine_ready, defaults]
      properties:
        strategy_type:
          $ref: "#/components/schemas/StrategyType"
        label:
          type: string
        description:
          type: string
        engine_ready:
          type: boolean
        defaults:
          oneOf:
            - $ref: "#/components/schemas/TrendStrategyParams"
            - $ref: "#/components/schemas/MeanReversionStrategyParams"
            - $ref: "#/components/schemas/FreeFormObject"

    StrategyCreate:
      type: object
      required: [name, strategy_type, params]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type: string
          maxLength: 500
          nullable: true
        strategy_type:
          $ref: "#/components/schemas/StrategyType"
        params:
          oneOf:
            - $ref: "#/components/schemas/TrendStrategyParams"
            - $ref: "#/components/schemas/MeanReversionStrategyParams"
            - $ref: "#/components/schemas/FreeFormObject"
        status:
          $ref: "#/components/schemas/StrategyStatus"

    StrategyOut:
      type: object
      required:
        [id, name, strategy_type, params, status, version, engine_ready]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        strategy_type:
          type: string
        params:
          $ref: "#/components/schemas/FreeFormObject"
        status:
          type: string
        version:
          type: integer
          minimum: 1
        engine_ready:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    StrategyRuntimeOut:
      type: object
      required:
        [strategy_id, name, version, status, strategy_type, engine_ready, params]
      properties:
        strategy_id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: integer
          minimum: 1
        status:
          type: string
        strategy_type:
          type: string
        engine_ready:
          type: boolean
        params:
          $ref: "#/components/schemas/FreeFormObject"

    BacktestCreate:
      type: object
      required: [strategy_id, start_date, end_date]
      properties:
        strategy_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        initial_cash:
          type: number
          exclusiveMinimum: 0
          default: 100000
