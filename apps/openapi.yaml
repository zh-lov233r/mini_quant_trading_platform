openapi: 3.1.0
info:
  title: Quant Trading Platform API
  version: "1.0.0"
  description: >
    回测（趋势跟踪/均值回归）与实盘下单的最小接口集。
    采用异步回测任务、统一错误返回、订单幂等键。
    The minimum interface set for backtesting (trend tracking/mean reversion) and live trading orders. 
    Adopted asynchronous backtesting tasks, unified error return, and order idempotent keys.
servers:
  - url: https://api.example.com/api/v1
    description: Production
  - url: http://localhost:8000/api/v1
    description: Local

tags:
  - name: Market
  - name: Strategies
  - name: Backtests
  - name: Trading
  - name: Health

paths:
  /healthz:
    get:
      tags: [Health]
      summary: 健康检查
      responses:
        "200":
          description: OK

  /strategies:
    get:
      tags: [Strategies]
      summary: 列出可用策略及参数schema
      responses:
        "200":
          description: 策略列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategySpec"

  /market/kline:
    get:
      tags: [Market]
      summary: 获取K线
      parameters:
        - in: query
          name: symbol
          schema: { type: string, example: AAPL }
          required: true
        - in: query
          name: timeframe
          schema: { $ref: "#/components/schemas/Timeframe" }
          required: true
        - in: query
          name: start
          description: ISO8601 开始时间
          schema: { type: string, format: date-time }
          required: true
        - in: query
          name: end
          description: ISO8601 结束时间
          schema: { type: string, format: date-time }
          required: true
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 10000, default: 1000 }
      responses:
        "200":
          description: K线
          content:
            application/json:
              schema:
                type: object
                properties:
                  symbol: { type: string }
                  timeframe: { $ref: "#/components/schemas/Timeframe" }
                  bars:
                    type: array
                    items:
                      $ref: "#/components/schemas/Bar"
        "400":
          $ref: "#/components/responses/BadRequest"

  /backtests:
    post:
      tags: [Backtests]
      summary: 提交回测任务（异步）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestCreate"
      responses:
        "202":
          description: 已接受任务
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                    example: "7b7b8d2d-5b8a-4c69-9a6a-8a0e0f9a1234"
        "400":
          $ref: "#/components/responses/BadRequest"

  /backtests/{id}:
    get:
      tags: [Backtests]
      summary: 查询回测任务状态与结果
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 任务状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backtest"
        "404":
          $ref: "#/components/responses/NotFound"

  /trades/orders:
    post:
      tags: [Trading]
      summary: 下单（支持幂等键）
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: 已创建订单
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: 幂等重复
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Trading]
      summary: 查询订单（可分页）
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 订单列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Order" }
                  page: { type: integer }
                  page_size: { type: integer }
                  total: { type: integer }

  /trades/orders/{id}:
    delete:
      tags: [Trading]
      summary: 撤单
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: 已撤单
        "404":
          $ref: "#/components/responses/NotFound"

  /trades/positions:
    get:
      tags: [Trading]
      summary: 当前持仓
      responses:
        "200":
          description: 持仓列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Position" }

  /trades/rebalance:
    post:
      tags: [Trading]
      summary: 生成并执行调仓（可选择仅生成建议）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RebalanceRequest"
      responses:
        "200":
          description: 调仓结果/建议单
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebalanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      in: query
      name: page_size
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }

  responses:
    BadRequest:
      description: 参数错误
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: 未找到
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    StrategyName:
      type: string
      enum: [sma_cross, rsi_reversion]
      description: 目前支持两类策略
    StrategySpec:
      type: object
      properties:
        name: { $ref: "#/components/schemas/StrategyName" }
        summary: { type: string, example: "SMA短长均线交叉趋势策略" }
        params_schema:
          type: object
          description: JSON Schema 片段，用于前端表单渲染
          example:
            short_window: { type: "integer", minimum: 2, maximum: 200, default: 20 }
            long_window: { type: "integer", minimum: 5, maximum: 400, default: 50 }
            take_profit: { type: "number", minimum: 0, maximum: 1, default: 0.1 }
            stop_loss: { type: "number", minimum: 0, maximum: 1, default: 0.05 }

    Timeframe:
      type: string
      enum: [1m,5m,15m,1h,1d]

    Bar:
      type: object
      properties:
        t: { type: string, format: date-time }
        o: { type: number }
        h: { type: number }
        l: { type: number }
        c: { type: number }
        v: { type: number }

    BacktestCreate:
      type: object
      required: [strategy, symbols, timeframe, start, end, params]
      properties:
        strategy: { $ref: "#/components/schemas/StrategyName" }
        symbols:
          type: array
          items: { type: string }
          example: ["AAPL","MSFT"]
        timeframe: { $ref: "#/components/schemas/Timeframe" }
        start: { type: string, format: date-time }
        end: { type: string, format: date-time }
        params:
          type: object
          description: 与策略匹配的参数对象
          example: { short_window: 20, long_window: 50, stop_loss: 0.05, take_profit: 0.1 }
        cost_bps:
          type: number
          description: 单边交易成本（基点）
          example: 2

    Backtest:
      type: object
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [queued, running, completed, failed]
        metrics:
          $ref: "#/components/schemas/BacktestMetrics"
        report_uri:
          type: string
          description: S3 报告地址
          example: "s3://quant/backtests/7b7b8d2d/report.json"
        error:
          type: string
          nullable: true

    BacktestMetrics:
      type: object
      properties:
        annual_return: { type: number, example: 0.132 }
        sharpe: { type: number, example: 1.45 }
        sortino: { type: number, example: 1.8 }
        max_drawdown: { type: number, example: -0.18 }
        win_rate: { type: number, example: 0.54 }
        turnover: { type: number, example: 3.2 }

    OrderSide:
      type: string
      enum: [buy, sell]

    OrderType:
      type: string
      enum: [market, limit]

    OrderCreate:
      type: object
      required: [symbol, side, qty, type]
      properties:
        symbol: { type: string, example: AAPL }
        side: { $ref: "#/components/schemas/OrderSide" }
        qty: { type: number, example: 10 }
        type: { $ref: "#/components/schemas/OrderType" }
        limit_price: { type: number, nullable: true }
        time_in_force: { type: string, enum: [day, gtc], default: day }
        allow_partial: { type: boolean, default: false }

    Order:
      type: object
      properties:
        id: { type: string }
        symbol: { type: string }
        side: { $ref: "#/components/schemas/OrderSide" }
        qty: { type: number }
        filled_qty: { type: number }
        status: { type: string, enum: [accepted, filled, partially_filled, canceled, rejected] }
        avg_fill_price: { type: number, nullable: true }
        broker_order_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Position:
      type: object
      properties:
        symbol: { type: string }
        qty: { type: number }
        avg_price: { type: number }
        market_price: { type: number }
        pnl: { type: number }

    RebalanceRequest:
      type: object
      required: [strategy, params, symbols, dry_run]
      properties:
        strategy: { $ref: "#/components/schemas/StrategyName" }
        params: { type: object }
        symbols:
          type: array
          items: { type: string }
        max_position_pct:
          type: number
          description: 单票最大仓位（占净值），如 0.1=10%
          example: 0.1
        dry_run:
          type: boolean
          description: true=只生成建议单; false=直接下单

    RebalanceResponse:
      type: object
      properties:
        dry_run: { type: boolean }
        generated_at: { type: string, format: date-time }
        orders:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/Order"
              - type: object
                description: 建议单（未执行）
                properties:
                  symbol: { type: string }
                  side: { $ref: "#/components/schemas/OrderSide" }
                  qty: { type: number }
                  reason: { type: string, example: "signal: long, sizing: 8% NAV" }

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, example: ERR_PARAM }
        message: { type: string, example: "invalid timeframe" }
        details: { type: object, nullable: true }
